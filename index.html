<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rough Paper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="toolbar">
    <div id="swatches">
      <button class="swatch active" data-color="#1a1a1a" style="background:#1a1a1a" title="Black" aria-label="Black"></button>
      <button class="swatch" data-color="#ffffff" style="background:#ffffff" title="White" aria-label="White"></button>
      <button class="swatch" data-color="#e63946" style="background:#e63946" title="Red" aria-label="Red"></button>
      <button class="swatch" data-color="#f4a261" style="background:#f4a261" title="Orange" aria-label="Orange"></button>
      <button class="swatch" data-color="#f9c74f" style="background:#f9c74f" title="Yellow" aria-label="Yellow"></button>
      <button class="swatch" data-color="#43aa8b" style="background:#43aa8b" title="Green" aria-label="Green"></button>
      <button class="swatch" data-color="#4cc9f0" style="background:#4cc9f0" title="Teal" aria-label="Teal"></button>
      <button class="swatch" data-color="#4361ee" style="background:#4361ee" title="Blue" aria-label="Blue"></button>
      <button class="swatch" data-color="#7209b7" style="background:#7209b7" title="Purple" aria-label="Purple"></button>
      <button class="swatch" data-color="#f72585" style="background:#f72585" title="Pink" aria-label="Pink"></button>
    </div>

    <div id="divider"></div>

    <div id="sizes">
      <button class="size-btn" data-size="2" title="Thin" aria-label="Thin brush">
        <span class="size-dot" style="width:4px;height:4px;"></span>
      </button>
      <button class="size-btn active" data-size="4" title="Medium" aria-label="Medium brush">
        <span class="size-dot" style="width:8px;height:8px;"></span>
      </button>
      <button class="size-btn" data-size="10" title="Thick" aria-label="Thick brush">
        <span class="size-dot" style="width:14px;height:14px;"></span>
      </button>
    </div>

    <div id="divider"></div>

    <button id="clear-btn" title="Clear canvas" aria-label="Clear canvas">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"></polyline>
        <path d="M19 6l-1 14H6L5 6"></path>
        <path d="M10 11v6"></path>
        <path d="M14 11v6"></path>
        <path d="M9 6V4h6v2"></path>
      </svg>
    </button>
  </div>

  <canvas id="canvas"></canvas>

  <script type="module" src="js/main.js"></script>
</body>
</html>
