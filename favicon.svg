<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Paper -->
  <rect x="1.5" y="1.5" width="21" height="27" rx="2.5" fill="#fef9f0" stroke="#c8b89a" stroke-width="1.2"/>
  <!-- Left margin line -->
  <line x1="6.5" y1="4" x2="6.5" y2="27" stroke="#f4a261" stroke-width="0.9" opacity="0.5"/>
  <!-- Ruled lines -->
  <line x1="8" y1="9"  x2="21" y2="9"  stroke="#e0d4be" stroke-width="0.7"/>
  <line x1="8" y1="14" x2="21" y2="14" stroke="#e0d4be" stroke-width="0.7"/>
  <line x1="8" y1="19" x2="21" y2="19" stroke="#e0d4be" stroke-width="0.7"/>
  <line x1="8" y1="24" x2="21" y2="24" stroke="#e0d4be" stroke-width="0.7"/>
  <!-- Ink squiggle (handwriting on the page) -->
  <path d="M 8 14 C 10.5 11 12.5 17 15 14 C 17 11.5 19 15 20.5 14"
        fill="none" stroke="#4361ee" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Pen body (diagonal, top-right → center-left) -->
  <path d="M 28.5 1.5 L 10.5 19.5 L 8 25.5 L 7.5 22.5 L 25.5 4.5 Z" fill="#4361ee"/>
  <!-- Pen cap (lighter blue) -->
  <path d="M 28.5 1.5 L 26.5 3.5 L 23.5 6.5 L 25.5 4.5 Z" fill="#7b95f0"/>
  <!-- Pen nib (dark graphite) -->
  <path d="M 10.5 19.5 L 8 25.5 L 7.5 22.5 Z" fill="#1a1a1a"/>
  <!-- Pen body gleam -->
  <line x1="27.5" y1="2.5" x2="12" y2="18" stroke="rgba(255,255,255,0.4)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
